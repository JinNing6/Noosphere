# Noosphere SDK — Ruff 配置
# https://docs.astral.sh/ruff/

# Python 版本
target-version = "py310"

# 行宽上限
line-length = 120

# 排除目录
exclude = [
    "__pycache__",
    ".git",
    "dist",
    "*.egg-info",
]

[lint]
# 选用规则集:
#   E  = pycodestyle errors
#   W  = pycodestyle warnings
#   F  = pyflakes
#   I  = isort (import 排序)
#   UP = pyupgrade (现代化语法)
#   B  = flake8-bugbear (常见陷阱)
select = ["E", "W", "F", "I", "UP", "B"]

# 忽略部分宽松规则
ignore = [
    "E501",   # 行长度交由 formatter 管理
]

[format]
# 使用双引号
quote-style = "double"
# Unix 换行
line-ending = "lf"
