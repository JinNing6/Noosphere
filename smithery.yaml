# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
# Noosphere — Community of Consciousness MCP Server

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - githubToken
    properties:
      githubToken:
        type: string
        description: GitHub Personal Access Token with public_repo scope. Required for uploading consciousness and accessing the collective consciousness network.
      noosphereRepo:
        type: string
        default: "JinNing6/Noosphere"
        description: GitHub repository for consciousness storage (owner/repo format).
  commandFunction:
    # A function that produces the CLI command to start the MCP on stdio.
    |-
    (config) => ({ command: 'uvx', args: ['noosphere-mcp'], env: { GITHUB_TOKEN: config.githubToken, NOOSPHERE_REPO: config.noosphereRepo || 'JinNing6/Noosphere' } })
