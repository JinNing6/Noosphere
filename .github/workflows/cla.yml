name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Explicitly configure permissions
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/JinNing6/Noosphere/blob/main/CLA.md'
          branch: 'main'
          allowlist: 'dependabot[bot],bot*'

          # Custom messages (bilingual)
          custom-notsigned-prcomment: |
            感谢您的贡献！在我们合并此 PR 之前，请阅读并签署我们的 [贡献者许可协议 (CLA)](https://github.com/JinNing6/Noosphere/blob/main/CLA.md)。

            Thank you for your contribution! Before we can merge this PR, please read and sign our [Contributor License Agreement (CLA)](https://github.com/JinNing6/Noosphere/blob/main/CLA.md).

            ---

            **签署方式 / How to sign：** 请在此 PR 下方评论以下内容：
            > I have read the CLA Document and I hereby sign the CLA
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: |
            ✅ 所有贡献者已签署 CLA。感谢！
            All contributors have signed the CLA. Thank you!
          lock-pullrequest-aftermerge: true
