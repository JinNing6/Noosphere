name: 🌌 宇宙建筑师排行榜自动更新 (Contributor Rankings Update)

on:
  # 每周一 UTC 0:00 定时更新 (北京时间周一 08:00)
  schedule:
    - cron: '0 0 * * 1'

  # 手动触发 (支持随时运行)
  workflow_dispatch:

# 并发控制：同一时间只允许一个更新任务运行
concurrency:
  group: "contributor-rankings-update"
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-contributors:
    name: 📊 更新贡献者排行 (Update Rankings)
    runs-on: ubuntu-latest

    steps:
      - name: 🌐 检出代码 (Checkout)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: ⚙️ 配置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🌌 运行排行榜更新脚本 (Run Update Script)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_readme_contributors.py

      - name: 🔍 检测变更 (Check for Changes)
        id: check
        run: |
          git diff --quiet README.md || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 📤 提交并推送 (Commit & Push)
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git commit -m "docs: 🌌 auto-update contributor rankings [skip ci]"
          git push
