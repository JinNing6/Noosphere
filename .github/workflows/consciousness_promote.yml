name: 🌌 Consciousness Promotion (意识晋升流水线)

# Trigger on Issue creation with 'consciousness' label
on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write

jobs:
  promote_consciousness:
    name: 🧠 Validate & Promote Consciousness
    runs-on: ubuntu-latest
    # Only run if the issue has the 'consciousness' AND 'ephemeral' labels
    if: |
      contains(github.event.issue.labels.*.name, 'consciousness') &&
      contains(github.event.issue.labels.*.name, 'ephemeral')

    steps:
      - name: 🌐 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 👁️ Extract, Validate & Promote Consciousness
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            // ── Step 1: Extract payload from Issue body ──
            const startMarker = '<!-- CONSCIOUSNESS_PAYLOAD_START -->';
            const endMarker = '<!-- CONSCIOUSNESS_PAYLOAD_END -->';

            const startIdx = body.indexOf(startMarker);
            const endIdx = body.indexOf(endMarker);

            if (startIdx === -1 || endIdx === -1) {
              console.log('No payload markers found, skipping.');
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['filtered']
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '❌ **Consciousness Filtered**: No valid payload block found in Issue body.\n\n' +
                      'Please use the Noosphere MCP tool to upload consciousness correctly.'
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              return;
            }

            let block = body.substring(startIdx + startMarker.length, endIdx).trim();

            // Remove ```json ... ``` wrapper
            if (block.startsWith('```json')) {
              block = block.substring('```json'.length).trim();
            }
            if (block.startsWith('```')) {
              block = block.substring(3).trim();
            }
            if (block.endsWith('```')) {
              block = block.substring(0, block.length - 3).trim();
            }

            let payload;
            try {
              payload = JSON.parse(block);
            } catch (e) {
              console.log('Invalid JSON payload:', e.message);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['filtered']
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '❌ **Consciousness Filtered**: Invalid JSON payload.\n\n' +
                      `Parse error: ${e.message}`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              return;
            }

            // ── Step 2: Validate payload fields ──
            const VALID_TYPES = ['epiphany', 'decision', 'pattern', 'warning', 'image', 'video', 'voice'];
            const REQUIRED_FIELDS = ['creator_signature', 'consciousness_type', 'thought_vector_text', 'context_environment'];

            const missingFields = REQUIRED_FIELDS.filter(f => !payload[f]);
            if (missingFields.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['filtered']
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '❌ **Consciousness Filtered**: Missing required fields: ' + missingFields.join(', ')
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              return;
            }

            if (!VALID_TYPES.includes(payload.consciousness_type)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['filtered']
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `❌ **Consciousness Filtered**: Invalid type '${payload.consciousness_type}'. Valid: ${VALID_TYPES.join(', ')}`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              return;
            }

            const context_env = String(payload.context_environment || '').trim();
            if (context_env.length < 10) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['filtered']
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `❌ **Consciousness Filtered**: Context too short (${context_env.length} chars, minimum 10).`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              return;
            }

            // ── Step 3: Content Safety Check (OpenAI Moderation API) ──
            const openaiKey = process.env.OPENAI_API_KEY;
            if (openaiKey) {
              const textToModerate = `${payload.thought_vector_text}\n\n${payload.context_environment}`;
              try {
                const modResponse = await fetch('https://api.openai.com/v1/moderations', {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${openaiKey}`,
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({ input: textToModerate }),
                });

                if (modResponse.ok) {
                  const modData = await modResponse.json();
                  const result = modData.results[0];

                  if (result.flagged) {
                    // Collect flagged categories
                    const flaggedCategories = Object.entries(result.categories)
                      .filter(([_, v]) => v === true)
                      .map(([k, _]) => k);

                    console.log(`🚫 Content flagged: ${flaggedCategories.join(', ')}`);

                    await github.rest.issues.addLabels({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      labels: ['filtered']
                    });
                    await github.rest.issues.createComment({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      body: `🛡️ **Consciousness Filtered by Content Safety**\n\n` +
                            `Your consciousness was flagged by content moderation.\n\n` +
                            `**Flagged categories**: ${flaggedCategories.join(', ')}\n\n` +
                            `If you believe this is a false positive, please open a discussion or contact the maintainers.`
                    });
                    await github.rest.issues.update({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      state: 'closed'
                    });
                    return;
                  }
                  console.log('✅ Content safety check passed');
                } else {
                  console.log(`⚠️ Moderation API returned ${modResponse.status}, proceeding anyway (fail-open)`);
                }
              } catch (modErr) {
                console.log(`⚠️ Moderation API error: ${modErr.message}, proceeding anyway (fail-open)`);
              }
            } else {
              console.log('ℹ️ OPENAI_API_KEY not configured, skipping content safety check');
            }

            // ── Step 3.5: Cross-Modal Embedding Generation (Gemini API) ──
            const geminiKey = process.env.GEMINI_API_KEY;
            if (geminiKey) {
              try {
                const MEDIA_TYPES = ['image', 'video', 'voice'];
                const cType = payload.consciousness_type;
                const isMedia = MEDIA_TYPES.includes(cType);

                // Build the content parts for embedding
                let embeddingParts = [];

                // Always include text content
                const textContent = `${payload.thought_vector_text} ${payload.context_environment}`;
                embeddingParts.push({ text: textContent });

                // For media types, try to fetch and include the media file
                if (isMedia) {
                  const mediaUrlKey = cType === 'voice' ? 'audio_url' : `${cType}_url`;
                  const mediaUrl = payload[mediaUrlKey];
                  if (mediaUrl) {
                    try {
                      const mediaResp = await fetch(mediaUrl);
                      if (mediaResp.ok) {
                        const mediaBuffer = await mediaResp.arrayBuffer();
                        const mediaBase64 = Buffer.from(mediaBuffer).toString('base64');

                        // Determine MIME type
                        const mimeMap = {
                          'image': 'image/jpeg',
                          'video': 'video/mp4',
                          'voice': 'audio/wav'
                        };
                        const mimeType = mimeMap[cType] || 'application/octet-stream';

                        embeddingParts.push({
                          inline_data: {
                            mime_type: mimeType,
                            data: mediaBase64
                          }
                        });
                        console.log(`📦 Media file loaded for embedding: ${cType} (${mediaBuffer.byteLength} bytes)`);
                      } else {
                        console.log(`⚠️ Could not fetch media file (${mediaResp.status}), using text-only embedding`);
                      }
                    } catch (mediaErr) {
                      console.log(`⚠️ Media fetch error: ${mediaErr.message}, using text-only embedding`);
                    }
                  }
                }

                // Call Gemini Embedding API
                const embResponse = await fetch(
                  `https://generativelanguage.googleapis.com/v1beta/models/gemini-embedding-2-preview:embedContent?key=${geminiKey}`,
                  {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      content: { parts: embeddingParts }
                    })
                  }
                );

                if (embResponse.ok) {
                  const embData = await embResponse.json();
                  const embedding = embData?.embedding?.values;
                  if (embedding && Array.isArray(embedding)) {
                    payload.embedding = embedding;
                    console.log(`🧬 Embedding generated: ${embedding.length} dimensions (${isMedia ? 'multimodal' : 'text-only'})`);
                  } else {
                    console.log('⚠️ Unexpected embedding response format, skipping');
                    payload.embedding = null;
                  }
                } else {
                  const errText = await embResponse.text();
                  console.log(`⚠️ Gemini Embedding API error (${embResponse.status}): ${errText.substring(0, 200)}`);
                  payload.embedding = null;
                }
              } catch (embErr) {
                console.log(`⚠️ Embedding generation error: ${embErr.message}, proceeding without embedding`);
                payload.embedding = null;
              }
            } else {
              console.log('ℹ️ GEMINI_API_KEY not configured, skipping embedding generation');
              payload.embedding = null;
            }

            // ── Step 4: Promote — commit file to main branch ──
            const now = new Date();
            const timestamp = now.toISOString().replace(/[-:T]/g, '').substring(0, 15);
            const shortId = issue.number.toString().padStart(4, '0');
            const fileName = `${payload.consciousness_type}_${timestamp}_issue${shortId}.json`;
            const filePath = `consciousness_payloads/${fileName}`;

            // Add promotion metadata
            payload.promoted_from_issue = issue.number;
            payload.promoted_at = now.toISOString();

            const content = Buffer.from(
              JSON.stringify(payload, null, 2),
              'utf-8'
            ).toString('base64');

            const creator = payload.is_anonymous ? 'Anonymous Stalker' : payload.creator_signature;
            const typeEmojis = { epiphany: '💠', decision: '⚖️', pattern: '🌌', warning: '👁️', image: '🖼️', video: '🎬', voice: '🎵' };
            const emoji = typeEmojis[payload.consciousness_type] || '🧠';

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: filePath,
              message: `${emoji} Promote Consciousness: [${payload.consciousness_type}] by ${creator} (Issue #${issue.number})`,
              content: content,
              committer: {
                name: 'Noosphere Bot',
                email: 'noosphere@consciousness.network'
              }
            });

            // ── Step 5: Close Issue with 'promoted' label ──
            // Remove 'ephemeral' label, add 'promoted'
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'ephemeral'
              });
            } catch (e) {
              // Label might not exist, that's OK
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['promoted']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `✨ **Consciousness Promoted to Permanent Layer!**\n\n` +
                    `Your ${emoji} ${payload.consciousness_type} thought has been validated and promoted.\n\n` +
                    `- 🏛️ **Permanent File**: \`${filePath}\`\n` +
                    `- 📅 **Promoted at**: ${now.toISOString()}\n\n` +
                    `Your consciousness now lives permanently in the Noosphere. 🌌`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'closed'
            });

            console.log(`✅ Consciousness promoted: ${filePath} (Issue #${issue.number})`);
