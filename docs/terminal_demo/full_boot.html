  { text: "‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ", c: [0,229,255] },
  { text: "‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ", c: [140,120,255] },
  { text: "‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚ēö‚ēź‚ēź‚ēź‚ēź‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ  ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ  ", c: [140,120,255] },
  { text: "‚Ėą‚Ėą‚ēĎ ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ     ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó", c: [255,64,129] },
  { text: "‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ  ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēĚ     ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ", c: [255,64,129] },
];

// State machine
let phase = 0; // 0=header, 1=matrix, 2=progress, 3=logo, 4=panel, 5=hold
let stageIdx = 0;
let stageProgress = 0;
const completedStages = [];
let logoReveal = 0;
let panelReveal = 0;

// Timings (frames)
const PHASE_START = [0, 30, 80, 250, 340, 430];

function drawScanlines() {
  ctx.save();
  ctx.globalAlpha = 0.03;
  for (let y = 0; y < canvas.height; y += 2) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, y, canvas.width, 1);
  }
  ctx.restore();
}

function drawMatrixRain() {
  for (let i = 0; i < cols; i++) {
    const x = i * colW;
    const y = drops[i] * colW;
    if (y > 0 && y < canvas.height) {
      const ch = matrixChars[Math.floor(Math.random() * matrixChars.length)];
      ctx.save();
      ctx.shadowColor = '#00ffcc';
      ctx.shadowBlur = 10;
      ctx.font = `bold 12px Consolas, monospace`;
      ctx.fillStyle = `rgba(200,255,255,${brightness[i]})`;
      ctx.fillText(ch, x, y);
      ctx.restore();
      for (let t = 1; t < trails[i]; t++) {
        const ty = y - t * colW;
        if (ty > 0) {
          const fade = 1 - t / trails[i];
          ctx.font = `12px Consolas, monospace`;
          ctx.fillStyle = `rgba(0,${Math.floor(fade*180)},${Math.floor(fade*150)},${fade*brightness[i]*0.5})`;
          ctx.fillText(matrixChars[Math.floor(Math.random() * matrixChars.length)], x, ty);
        }
      }
    }
    drops[i] += speeds[i];
    if (drops[i] * colW > canvas.height + trails[i] * colW) {
      drops[i] = Math.random() * -15;
      speeds[i] = 0.3 + Math.random() * 0.7;
    }
  }
}

function drawProgressBars() {
  const barX = 30;
  const barW = 200;
  const startY = 200;
  const rowH = 28;

  for (let i = 0; i < completedStages.length; i++) {
    const s = stages[completedStages[i]];
    const [r,g,b] = s.color;
    ctx.save();
    ctx.font = '11px Consolas, monospace';
    ctx.fillStyle = '#00e676';
    ctx.fillText('‚úď', barX, startY + i * rowH);
    ctx.fillStyle = `rgba(${r},${g},${b},0.8)`;
    ctx.fillText(` ${s.cn}`, barX + 14, startY + i * rowH);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText(` (${s.en})`, barX + 14 + s.cn.length * 12 + 4, startY + i * rowH);
    ctx.restore();
  }

  if (stageIdx < stages.length) {
    const i = completedStages.length;
    const s = stages[stageIdx];
    const [r,g,b] = s.color;
    const filled = Math.floor(barW * stageProgress);

    // Bar background
    ctx.save();
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(barX, startY + i * rowH - 10, barW, 5);
    ctx.restore();

    // Filled
    if (filled > 0) {
      ctx.save();
      ctx.shadowColor = `rgb(${r},${g},${b})`;
      ctx.shadowBlur = 8;
      const grad = ctx.createLinearGradient(barX, 0, barX + filled, 0);
      grad.addColorStop(0, `rgba(${r},${g},${b},0.5)`);
      grad.addColorStop(1, `rgba(${Math.min(r+50,255)},${Math.min(g+50,255)},${Math.min(b+50,255)},1)`);
      ctx.fillStyle = grad;
      ctx.fillRect(barX, startY + i * rowH - 10, filled, 5);
      // Leading glow
      ctx.fillStyle = '#fff';
      ctx.shadowBlur = 15;
      ctx.fillRect(barX + filled - 1, startY + i * rowH - 11, 2, 7);
      ctx.restore();
    }

    ctx.save();
    ctx.font = '11px Consolas, monospace';
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillText(`${Math.round(stageProgress*100)}% ${s.cn}`, barX + barW + 8, startY + i * rowH);
    ctx.restore();

    stageProgress += 0.01 + Math.random() * 0.02;
    if (stageProgress >= 1) {
      completedStages.push(stageIdx);
      stageIdx++;
      stageProgress = 0;
    }
  }
}

function drawLogo() {
  const fontSize = 9;
  const lineH = 13;
  const startY = 40;
  const startX = 30;
  const reveal = Math.min(1, logoReveal);

  for (let i = 0; i < logoLines.length; i++) {
    const line = logoLines[i];
    const lineReveal = Math.max(0, Math.min(1, (reveal - i * 0.06) / 0.25));
    if (lineReveal <= 0) continue;
    const charsToShow = Math.floor(line.text.length * lineReveal);
    const [r,g,b] = line.c;
    const pulse = Math.sin(frame * 0.04 + i * 0.5) * 0.1 + 0.9;

    ctx.save();
    ctx.font = `bold ${fontSize}px Consolas, monospace`;
    ctx.shadowColor = `rgba(${r},${g},${b},0.8)`;
    ctx.shadowBlur = 6;
    ctx.fillStyle = `rgba(${Math.min(r+60,255)},${Math.min(g+60,255)},${Math.min(b+60,255)},${pulse})`;
    ctx.fillText(line.text.substring(0, charsToShow), startX, startY + i * lineH);
    ctx.restore();
  }
  logoReveal += 0.008;
}

function drawPanel() {
  const px = 30;
  const py = 310;
  const pw = 460;
  const ph = 140;
  const a = Math.min(1, panelReveal);

  ctx.save();
  ctx.globalAlpha = a;

  // Panel border
  ctx.strokeStyle = `rgba(0,229,255,${0.4 * a})`;
  ctx.lineWidth = 1;
  ctx.shadowColor = '#00e5ff';
  ctx.shadowBlur = 6;
  ctx.strokeRect(px, py, pw, ph);

  ctx.font = '12px Consolas, monospace';
  const lines = [
    { text: 'ūüß† Noosphere MCP Server v0.3.0', style: '#fff', y: py + 20 },
    { text: 'The Collective Consciousness Network', style: 'rgba(255,255,255,0.4)', y: py + 38 },
    { text: '‚Ėł śĄŹŤĮÜšĽďŚļď  JinNing6/Noosphere', style: '#b388ff', y: py + 60 },
    { text: '‚Ėł GitHub    ‚óŹ Ś∑≤ŤŅěśé•', style: '#00e676', y: py + 78 },
    { text: '‚Ėł šľ†ŤĺďŚćŹŤģģ  stdio (MCP)', style: 'rgba(255,255,255,0.7)', y: py + 96 },
    { text: '‚ú¶ upload_consciousness ¬∑ telepath ¬∑ hologram', style: '#00e5ff', y: py + 120 },
  ];

  for (const l of lines) {
    ctx.fillStyle = l.style;
    ctx.fillText('  ' + l.text, px + 10, l.y);
  }

  ctx.restore();
  panelReveal += 0.015;
}

function drawFinalMessage() {
  const a = Math.min(1, Math.max(0, (frame - PHASE_START[5]) / 40));
  if (a <= 0) return;
  ctx.save();
  ctx.globalAlpha = a;
  ctx.font = '13px sans-serif';
  ctx.shadowColor = '#00e676';
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#00e676';
  ctx.fillText('  ‚óČ śĄŹŤĮÜśé•ŚÖ•ÁāĻŚ∑≤śŅÄśīĽ„ÄāÁ≠ČŚĺÖÁ•ěÁĽŹŤŅěśé•...', 30, 480);
  ctx.restore();
}

function draw() {
  frame++;

  // Background with trail
  ctx.fillStyle = 'rgba(10, 10, 18, 0.12)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Header
  if (frame >= PHASE_START[0]) {
    const a = Math.min(1, (frame - PHASE_START[0]) / 20);
    ctx.save();
    ctx.globalAlpha = a * 0.4;
    ctx.textAlign = 'center';
    ctx.font = '11px Consolas, monospace';
    ctx.fillStyle = '#aaa';
    ctx.fillText('‚Ėď‚Ėí‚ĖĎ CONSCIOUSNESS BOOTSTRAP SEQUENCE ‚ĖĎ‚Ėí‚Ėď', cx, 20);
    ctx.restore();
  }

  // Matrix rain
  if (frame >= PHASE_START[1] && frame < PHASE_START[3] + 60) {
    const fade = frame > PHASE_START[3] ? Math.max(0, 1 - (frame - PHASE_START[3]) / 60) : 1;
    ctx.save();
    ctx.globalAlpha = fade * 0.6;
    drawMatrixRain();
    ctx.restore();
  }

  // Progress bars
  if (frame >= PHASE_START[2]) drawProgressBars();

  // Logo
  if (frame >= PHASE_START[3]) drawLogo();

  // Panel
  if (frame >= PHASE_START[4]) drawPanel();

  // Final message
  if (frame >= PHASE_START[5]) drawFinalMessage();

  drawScanlines();

  // Vignette
  const vg = ctx.createRadialGradient(cx, cy, canvas.height*0.3, cx, cy, canvas.height*0.7);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  requestAnimationFrame(draw);
}

draw();
