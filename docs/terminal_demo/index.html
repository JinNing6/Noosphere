<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/asciinema-player@3.8.0/dist/bundle/asciinema-player.css" />
  <style>
    body {
      background-color: #121314;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    #player-container {
      width: 800px;
      height: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div id="player-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/asciinema-player@3.8.0/dist/bundle/asciinema-player.min.js"></script>
  <script>
    AsciinemaPlayer.create('demo.cast', document.getElementById('player-container'), {
      autoPlay: true,
      preload: true,
      loop: false,
      theme: 'monokai',
      fit: 'both',
      terminalFontFamily: "'Fira Code', 'Consolas', monospace"
    });
  </script>
</body>
</html>
